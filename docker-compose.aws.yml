version: "3.9"

# =========================================================================
# Orquestación de servicios para despliegue/prueba usando base de datos externa (AWS/Render).
# Aquí SOLO se levanta el backend. La base de datos vive fuera de Docker.
# =========================================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: potato_leaf_api_aws
    restart: unless-stopped
    env_file:
      - .env
    # La variable DATABASE_URL ahora debe venir de tu archivo .env
    # y apuntar a tu RDS de AWS o tu DB de Render.
    environment:
      TF_ENABLE_ONEDNN_OPTS: "0"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - potato_leaf_network

networks:
  potato_leaf_network:
    driver: bridge
