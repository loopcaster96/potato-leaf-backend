version: "3.9"

# =========================================================================
# Orquestación de servicios para el backend de diagnóstico fitosanitario.
#
# El servicio `web` depende explícitamente de que `db` reporte un estado
# de salud "healthy" antes de iniciar su propio proceso de arranque
# (`condition: service_healthy`), evitando la condición de carrera típica
# en la que la API intenta conectarse a PostgreSQL antes de que el motor
# de base de datos haya completado su propia inicialización interna.
# =========================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: potato_leaf_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-potato_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-potato_leaf_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-potato_admin} -d ${POSTGRES_DB:-potato_leaf_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - potato_leaf_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: potato_leaf_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-potato_admin}:${POSTGRES_PASSWORD:-change_me_in_production}@db:5432/${POSTGRES_DB:-potato_leaf_db}
      TF_ENABLE_ONEDNN_OPTS: "0"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - potato_leaf_network

volumes:
  postgres_data:
    driver: local

networks:
  potato_leaf_network:
    driver: bridge
